<!--

  --------------------------------------------------------------------
  Tech : Tailwind CSS via CDN, vanilla JS, Mermaid.js for DFD (CDN).
  State: in-memory only; mirrors the seed data of db/02_schema_and_seed.sql
  Safety: all user-visible strings pass through escapeHtml() before injection.
  Compatibility: works by double-clicking the file in any modern browser.
-->

  .ss-grad   { background: linear-gradient(135deg, var(--ss-accent), var(--ss-accent-2)); }
  .ss-text-grad {
    background: linear-gradient(135deg, var(--ss-accent), var(--ss-accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .nav-item:hover { background: var(--ss-bg-2); color: var(--ss-text); }
  .nav-item.active{ background: var(--ss-bg-2); color: var(--ss-text); border-left: 3px solid var(--ss-accent); }

  .pill-warn   { background: rgba(251,191,36,.15);  color: var(--ss-warn); }

  .pill-info   { background: rgba(34,211,238,.15);  color: var(--ss-accent-2); }

  .pbar       { height: 8px; background: var(--ss-line); border-radius: 999px; overflow: hidden; }
  .pbar > div { height: 100%; background: linear-gradient(90deg, var(--ss-accent), var(--ss-accent-2)); }
  /* form controls */
  input, select, textarea {
    background: var(--ss-bg);
    border: 1px solid var(--ss-line);
    color: var(--ss-text);
    border-radius: 8px;
    padding: 9px 12px;
    width: 100%;
    font-size: 14px;
  }

  label { font-size: 12px; color: var(--ss-muted); display: block; margin-bottom: 4px; }

  .erd-table h4 { background: var(--ss-accent); color: #fff; padding: 6px 10px; border-radius: 9px 9px 0 0; font-size: 12px; font-weight: 700; }
  .erd-table ul { padding: 8px 10px; }
  .erd-table li { padding: 2px 0; color: var(--ss-text); }
  .erd-table li.pk  { color: var(--ss-warn); font-weight: 600; }
  .erd-table li.fk  { color: var(--ss-accent-2); }
  /* kanban */

  .kanban-card { background: var(--ss-panel); border: 1px solid var(--ss-line); border-radius: 10px; padding: 10px; margin-bottom: 8px; }

/* ------------------------------------------------------------------
   3.  UTILITIES
   ------------------------------------------------------------------ */
function escapeHtml(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtCurrency(amount, currency) {
  const n = Number(amount);
  if (!Number.isFinite(n)) return '—';
  try {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD', maximumFractionDigits: 0 }).format(n);
  } catch (err) {
    return '$' + n.toLocaleString();
  }
}

function fmtDate(isoDate) {
  if (!isoDate) return '—';
  // Already validated YYYY-MM-DD; render in locale-aware short form
  try {
    const d = new Date(isoDate + 'T00:00:00Z');
    if (isNaN(d.getTime())) return escapeHtml(isoDate);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit', timeZone: 'UTC' });
  } catch (err) {
    return escapeHtml(isoDate);
  }
}

function daysBetween(aIso, bIso) {
  if (!aIso || !bIso) return null;
  const a = new Date(aIso + 'T00:00:00Z');
  const b = new Date(bIso + 'T00:00:00Z');
  if (isNaN(a.getTime()) || isNaN(b.getTime())) return null;
  return Math.round((b - a) / 86400000);
}

function findById(arr, id) {
  if (!Array.isArray(arr) || !id) return null;
  return arr.find(x => x && x.id === id) || null;
}

function safeRender(targetEl, html) {
  if (!targetEl) return;
  targetEl.innerHTML = html;
}

function statusPill(status) {
  const map = {
    Pending: 'pill-neutral', InProgress: 'pill-info', Blocked: 'pill-bad',
    Submitted: 'pill-warn',  Approved: 'pill-good',   Rejected: 'pill-bad',
    Proposed: 'pill-neutral', OnHold: 'pill-warn', Completed: 'pill-good', Cancelled: 'pill-bad',
    Draft: 'pill-neutral', Issued: 'pill-info', Paid: 'pill-good', Overdue: 'pill-bad', Void: 'pill-bad'
  };
  const cls = map[status] || 'pill-neutral';
  return '<span class="pill ' + cls + '">' + escapeHtml(status) + '</span>';
}

/* ------------------------------------------------------------------
   4.  DERIVED COMPUTATIONS
   ------------------------------------------------------------------ */
function projectProgress(projectId) {
  // % = (sum of done subtasks across project's tasks) / (total subtasks)
  const taskIds  = SEED.tasks.filter(t => t.project_id === projectId).map(t => t.id);
  if (taskIds.length === 0) return { pct: 0, done: 0, total: 0 };
  const subs = SEED.subtasks.filter(s => taskIds.includes(s.task_id));
  if (subs.length === 0) return { pct: 0, done: 0, total: 0 };
  const done = subs.filter(s => s.is_done).length;
  return { pct: Math.round((done / subs.length) * 100), done, total: subs.length };
}

function projectInvoicedTotal(projectId) {
  return SEED.invoices
    .filter(i => i.project_id === projectId && i.status !== 'Void' && i.status !== 'Draft')
    .reduce((acc, i) => acc + Number(i.amount_issued), 0);
}

function projectVarianceDays(projectId) {
  // Returns number of days between actual_end and planned_end. Null if not finished.
  const p = findById(SEED.projects, projectId);
  if (!p || !p.actual_end) return null;
  return daysBetween(p.planned_end, p.actual_end); // positive = late
}

function staffVelocity(userId) {
  // simple proxy: total subtasks completed by tasks assigned to this user
  const myTasks = SEED.tasks.filter(t => t.assigned_to === userId);
  const myTaskIds = myTasks.map(t => t.id);
  const myDone = SEED.subtasks.filter(s => myTaskIds.includes(s.task_id) && s.is_done).length;
  const myTotal = SEED.subtasks.filter(s => myTaskIds.includes(s.task_id)).length;
  return { done: myDone, total: myTotal, tasks: myTasks.length };
}

/* ------------------------------------------------------------------
   6.  AUTHENTICATION & ROLE SWITCHING
   ------------------------------------------------------------------ */
function getCurrentUser() {
  return findById(SEED.users, appState.currentUserId);
}

function getCurrentRole() {
  const u = getCurrentUser();
  return u ? u.role : null;
}

function login(userId) {
  const user = findById(SEED.users, userId);
  if (!user) {
    alert('Selected persona could not be found.');
    return;
  }
  appState.isAuthenticated = true;
  appState.currentUserId   = user.id;
  appState.activeView      = defaultViewForRole(user.role);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  renderShell();
}

function logout() {
  appState.isAuthenticated = false;
  appState.currentUserId   = null;
  appState.activeView      = 'login';
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

function defaultViewForRole(role) {
  if (role === 'Manager')      return 'mgr-dash';
  if (role === 'Client')       return 'cli-track';
  if (role === 'WorkingStaff') return 'staff-kanban';
  return 'erd';
}

function switchRole(targetRole) {
  // Switch to ANY user that has the requested role (first match) so the
  // role-switcher is a true demo control.
  const next = SEED.users.find(u => u.role === targetRole);
  if (!next) {
    alert('No provisioned user found with role: ' + targetRole);
    return;
  }
  appState.currentUserId = next.id;
  appState.activeView    = defaultViewForRole(targetRole);
  renderShell();
}

/* ------------------------------------------------------------------
   7.  SHELL RENDERING (sidebar, topbar, then dispatch to view)
   ------------------------------------------------------------------ */
function renderShell() {
  const user = getCurrentUser();
  if (!user) { logout(); return; }

  /* topbar */
  document.getElementById('current-user-name').textContent = user.full_name;
  const company = findById(SEED.companies, user.company_id);
  document.getElementById('current-user-meta').textContent =
    user.role + ' · ' + (company ? company.legal_name : 'Unknown company');

  /* role buttons */
  document.querySelectorAll('.role-btn').forEach(btn => {
    const isActive = btn.dataset.role === user.role;
    btn.classList.toggle('btn-primary', isActive);
    btn.classList.toggle('text-[var(--ss-muted)]', !isActive);
  });

  /* sidebar */
  const items = MENU[user.role] || [];
  const sidebarHtml = items.map(item => {
    if (item.group) {
      return '<div class="px-5 pt-4 pb-1 text-[10px] uppercase tracking-wider ss-muted font-semibold">' + escapeHtml(item.group) + '</div>';
    }
    const isActive = appState.activeView === item.id;
    return '<button data-nav="' + escapeHtml(item.id) + '" class="nav-item ' + (isActive ? 'active' : '') + ' w-full text-left px-5 py-2.5 text-sm flex items-center gap-3">' +
           '<span>' + escapeHtml(item.icon) + '</span>' +
           '<span>' + escapeHtml(item.label) + '</span>' +
           '</button>';
  }).join('');
  document.getElementById('sidebar-nav').innerHTML = sidebarHtml;

  /* title block */
  const title = VIEW_TITLES[appState.activeView] || ['SyncSpace', ''];
  document.getElementById('view-title').textContent    = title[0];
  document.getElementById('view-subtitle').textContent = title[1];

  /* dispatch to per-view renderer */
  renderActiveView();
}

function renderActiveView() {
  const root = document.getElementById('view-container');
  const view = appState.activeView;

  // --- guard: if the requested view is not in the user's menu, fall back ---
  const allowed = (MENU[getCurrentRole()] || []).some(it => it.id === view);
  if (!allowed) {
    appState.activeView = defaultViewForRole(getCurrentRole());
    renderShell();
    return;
  }

  switch (view) {
    case 'mgr-dash':     return safeRender(root, renderManagerDashboard());
    case 'mgr-fin':      return safeRender(root, renderFinancialLedger());
    case 'mgr-perf':     return safeRender(root, renderPerformanceGrid());
    case 'mgr-prov':     return safeRender(root, renderProvisioningForm());
    case 'mgr-proj':     return safeRender(root, renderProjectForm());
    case 'mgr-task':     return safeRender(root, renderTaskDelegator());
    case 'rpt-variance': return safeRender(root, renderVarianceReport());
    case 'rpt-yield':    return safeRender(root, renderYieldReport());
    case 'cli-track':    return safeRender(root, renderClientTracker());
    case 'cli-inv':      return safeRender(root, renderClientInvoices());
    case 'cli-prop':     return safeRender(root, renderProposalForm());
    case 'staff-kanban': return safeRender(root, renderStaffKanban());
    case 'staff-exec':   return safeRender(root, renderExecutionCard());
    case 'staff-submit': return safeRender(root, renderSubmissionForm());
    case 'erd':          return safeRender(root, renderERD());
    case 'dfd': {
      safeRender(root, renderDFD());
      // Mermaid renders after the DOM node exists. Wrapped in try/catch:
      try {
        if (window.mermaid && typeof window.mermaid.run === 'function') {
          window.mermaid.run({ querySelector: '.mermaid' });
        }
      } catch (err) {
        console.warn('Mermaid render skipped: ' + err.message);
      }
      return;
    }
    default:             return safeRender(root, '<div class="ss-muted">Unknown view.</div>');
  }
}

/* ----- MANAGER OUTPUT 1: Global Analytics Dashboard -------------- */
function renderManagerDashboard() {
  const totalProjects = SEED.projects.length;
  const inProgress    = SEED.projects.filter(p => p.status === 'InProgress').length;
  const completed     = SEED.projects.filter(p => p.status === 'Completed').length;
  const proposed      = SEED.projects.filter(p => p.status === 'Proposed').length;

  const allSubs    = SEED.subtasks.length;
  const doneSubs   = SEED.subtasks.filter(s => s.is_done).length;
  const overallPct = allSubs ? Math.round(doneSubs / allSubs * 100) : 0;

  const rows = SEED.projects.map(p => {
    const prog = projectProgress(p.id);
    const variance = projectVarianceDays(p.id);
    let varCell = '<span class="ss-muted">—</span>';
    if (variance !== null) {
      if (variance > 0)      varCell = '<span class="pill pill-bad">+' + variance + ' d (late)</span>';
      else if (variance < 0) varCell = '<span class="pill pill-good">' + variance + ' d (early)</span>';
      else                   varCell = '<span class="pill pill-info">on time</span>';
    }
    const client = findById(SEED.companies, p.client_company_id);
    return '<tr>' +
      '<td><div class="font-semibold">' + escapeHtml(p.title) + '</div><div class="ss-muted text-xs">' + escapeHtml(p.code) + '</div></td>' +
      '<td>' + escapeHtml(client ? client.legal_name : '—') + '</td>' +
      '<td>' + statusPill(p.status) + '</td>' +
      '<td><div class="flex items-center gap-2 min-w-[160px]"><div class="pbar flex-1"><div style="width:' + prog.pct + '%"></div></div><span class="text-xs ss-muted whitespace-nowrap">' + prog.pct + '%</span></div></td>' +
      '<td>' + varCell + '</td>' +
      '<td class="font-mono text-right">' + escapeHtml(fmtCurrency(p.quotation_amount)) + '</td>' +
      '</tr>';
  }).join('');

  return [
    '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">',
       kpi('Total projects',  totalProjects, '#7c5cff'),
       kpi('In progress',     inProgress,    '#22d3ee'),
       kpi('Completed',       completed,     '#34d399'),
       kpi('Proposed',        proposed,      '#fbbf24'),
    '</div>',
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">',
    '  <div class="ss-panel p-5 lg:col-span-1">',
    '    <h4 class="ss-muted text-xs uppercase tracking-wider mb-3">Fleet completion rate</h4>',
    '    <div class="text-4xl font-bold">' + overallPct + '%</div>',
    '    <div class="ss-muted text-xs mb-3">' + doneSubs + ' / ' + allSubs + ' subtasks done across all active projects</div>',
    '    <div class="pbar"><div style="width:' + overallPct + '%"></div></div>',
    '  </div>',
    '  <div class="ss-panel p-5 lg:col-span-2">',
    '    <h4 class="ss-muted text-xs uppercase tracking-wider mb-3">Projects · planned vs. actual</h4>',
    '    <table class="ss-tbl"><thead><tr><th>Project</th><th>Client</th><th>Status</th><th>Progress</th><th>Variance</th><th class="text-right">Quotation</th></tr></thead><tbody>' + rows + '</tbody></table>',
    '  </div>',
    '</div>'
  ].join('');
}

function kpi(label, value, color) {
  return '<div class="ss-panel p-5">' +
    '<div class="ss-muted text-xs uppercase tracking-wider">' + escapeHtml(label) + '</div>' +
    '<div class="text-3xl font-bold mt-1" style="color:' + color + '">' + escapeHtml(String(value)) + '</div>' +
    '</div>';
}

       kpi('Quotations on the book', fmtCurrency(totalQuoted),   '#7c5cff'),
       kpi('Issued (non-void)',      fmtCurrency(totalInvoiced), '#22d3ee'),

    '</div>',
    '<div class="ss-panel p-5">',
    '  <h3 class="text-lg font-semibold mb-4">All invoices</h3>',
    '  <table class="ss-tbl"><thead><tr><th>Invoice #</th><th>Project</th><th>Status</th><th>Issued</th><th>Due</th><th class="text-right">Amount</th></tr></thead><tbody>' + allInvRows + '</tbody></table>',
    '</div>'
  ].join('');
}

/* ----- MANAGER OUTPUT 3: Performance Grid ------------------------ */
function renderPerformanceGrid() {
  const staff = SEED.users.filter(u => u.role === 'WorkingStaff');
  const rows = staff.map(u => {
    const v = staffVelocity(u.id);
    const completedTasks = SEED.tasks.filter(t => t.assigned_to === u.id && t.status === 'Approved');
    // average lead time (actual_completed_at - actual_start) in days
    const leads = completedTasks.map(t => daysBetween(t.actual_start, t.actual_completed_at)).filter(x => x !== null);
    const avgLead = leads.length ? Math.round(leads.reduce((a,b) => a+b, 0) / leads.length) : null;
    const subDonePct = v.total ? Math.round(v.done / v.total * 100) : 0;
    return '<tr>' +
      '<td><div class="font-semibold">' + escapeHtml(u.full_name) + '</div><div class="ss-muted text-xs">' + escapeHtml(u.email) + '</div></td>' +
      '<td class="font-mono">' + v.tasks + '</td>' +
      '<td class="font-mono">' + completedTasks.length + '</td>' +
      '<td class="font-mono">' + v.done + ' / ' + v.total + '</td>' +
      '<td><div class="flex items-center gap-2 min-w-[150px]"><div class="pbar flex-1"><div style="width:' + subDonePct + '%"></div></div><span class="text-xs ss-muted">' + subDonePct + '%</span></div></td>' +
      '<td class="font-mono">' + (avgLead === null ? '—' : avgLead + ' d') + '</td>' +
      '</tr>';
  }).join('');

  return [
    '<div class="ss-panel p-5">',
    '  <h3 class="text-lg font-semibold mb-1">WorkingStaff performance</h3>',
    '  <p class="ss-muted text-sm mb-5">Velocity is measured by completed subtasks and average lead time on Approved tasks.</p>',
    '  <table class="ss-tbl"><thead><tr><th>Member</th><th>Tasks assigned</th><th>Tasks approved</th><th>Subtasks done</th><th>Subtask completion</th><th>Avg lead time</th></tr></thead><tbody>' + rows + '</tbody></table>',
    '</div>'
  ].join('');
}

    const p = findById(SEED.projects, i.project_id);
    return '<tr>' +
      '<td class="font-mono">' + escapeHtml(i.invoice_number) + '</td>' +
      '<td><div>' + escapeHtml(p ? p.title : '') + '</div><div class="ss-muted text-xs">' + escapeHtml(p ? p.code : '') + '</div></td>' +
      '<td>' + statusPill(i.status) + '</td>' +
      '<td>' + escapeHtml(fmtDate(i.issue_date)) + '</td>' +
      '<td>' + escapeHtml(fmtDate(i.due_date)) + '</td>' +
      '<td>' + escapeHtml(fmtDate(i.paid_at)) + '</td>' +
      '<td class="font-mono text-right">' + escapeHtml(fmtCurrency(i.amount_issued)) + '</td>' +
      '<td><button class="text-xs ss-muted border border-[var(--ss-line)] rounded-md px-2 py-1 hover:text-white">⬇ Download PDF</button></td>' +
    '</tr>';
  }).join('');

  return [
    '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">',
       kpi('Paid',    fmtCurrency(totals.paid),    '#34d399'),
       kpi('Issued',  fmtCurrency(totals.issued),  '#22d3ee'),
       kpi('Overdue', fmtCurrency(totals.overdue), '#f87171'),
    '</div>',
    '<div class="ss-panel p-5">',
    '  <h3 class="text-lg font-semibold mb-4">Statement of invoices</h3>',
    '  <table class="ss-tbl"><thead><tr><th>Invoice #</th><th>Project</th><th>Status</th><th>Issued</th><th>Due</th><th>Paid on</th><th class="text-right">Amount</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>',
    '</div>'
  ].join('');
}

/* ----- WORKINGSTAFF OUTPUT: Kanban ------------------------------- */
function renderStaffKanban() {
  const me = getCurrentUser();
  const myTasks = SEED.tasks.filter(t => t.assigned_to === me.id);

  const columns = [
    { key: 'todo',  label: 'To Do',       statuses: ['Pending'],          color: '#fbbf24' },
    { key: 'doing', label: 'In Progress', statuses: ['InProgress','Submitted'], color: '#22d3ee' },
    { key: 'done',  label: 'Done',        statuses: ['Approved'],         color: '#34d399' },
    { key: 'block', label: 'Blocked',     statuses: ['Blocked','Rejected'],color: '#f87171' }
  ];

  const cards = (statuses) => myTasks.filter(t => statuses.includes(t.status)).map(t => {
    const proj = findById(SEED.projects, t.project_id);
    const subs = SEED.subtasks.filter(s => s.task_id === t.id);
    const doneCount = subs.filter(s => s.is_done).length;
    const pct = subs.length ? Math.round(doneCount / subs.length * 100) : 0;
    return '<div class="kanban-card">' +
      '<div class="text-[10px] ss-muted">' + escapeHtml(proj ? proj.code : '') + '</div>' +
      '<div class="font-semibold text-sm mb-1">' + escapeHtml(t.title) + '</div>' +
      '<div class="ss-muted text-xs mb-2">due ' + escapeHtml(fmtDate(t.expected_due)) + '</div>' +
      (subs.length ? '<div class="pbar mb-1"><div style="width:' + pct + '%"></div></div><div class="ss-muted text-[10px]">' + doneCount + '/' + subs.length + ' subtasks</div>' : '') +
    '</div>';
  }).join('') || '<div class="ss-muted text-xs">— empty —</div>';

  return [
    '<div class="grid grid-cols-1 md:grid-cols-4 gap-4">',
      columns.map(c =>
        '<div class="kanban-col">' +
          '<div class="flex items-center justify-between mb-3"><h4 class="font-semibold text-sm" style="color:' + c.color + '">' + escapeHtml(c.label) + '</h4>' +
          '<span class="ss-muted text-xs">' + myTasks.filter(t => c.statuses.includes(t.status)).length + '</span></div>' +
          cards(c.statuses) +
        '</div>'
      ).join(''),
    '</div>'
  ].join('');
}

/* ----- MIS REPORT 1: Schedule Variance --------------------------- */
function renderVarianceReport() {
  // task-level variance: (actual_completed_at - expected_due) in days
  const rows = SEED.tasks.map(t => {
    const proj = findById(SEED.projects, t.project_id);
    const assignee = findById(SEED.users, t.assigned_to);
    const variance = (t.actual_completed_at) ? daysBetween(t.expected_due, t.actual_completed_at) : null;
    let vCell;
    if (variance === null) {
      vCell = '<span class="pill pill-neutral">in flight</span>';
    } else if (variance > 2) {
      vCell = '<span class="pill pill-bad">+' + variance + ' d late</span>';
    } else if (variance > 0) {
      vCell = '<span class="pill pill-warn">+' + variance + ' d</span>';
    } else if (variance === 0) {
      vCell = '<span class="pill pill-info">on time</span>';
    } else {
      vCell = '<span class="pill pill-good">' + variance + ' d (early)</span>';
    }
    return '<tr>' +
      '<td>' + escapeHtml(proj ? proj.code : '—') + '</td>' +
      '<td>' + escapeHtml(t.title) + '</td>' +
      '<td>' + escapeHtml(assignee ? assignee.full_name : '—') + '</td>' +
      '<td>' + escapeHtml(fmtDate(t.expected_due)) + '</td>' +
      '<td>' + escapeHtml(fmtDate(t.actual_completed_at)) + '</td>' +
      '<td>' + vCell + '</td>' +
      '<td>' + statusPill(t.status) + '</td>' +
    '</tr>';
  }).join('');

  // project level
  const projRows = SEED.projects.map(p => {
    const v = projectVarianceDays(p.id);
    let vCell = v === null
      ? '<span class="pill pill-neutral">in flight</span>'
      : (v > 0  ? '<span class="pill pill-bad">+' + v + ' d</span>'
        : v < 0 ? '<span class="pill pill-good">' + v + ' d (early)</span>'
                : '<span class="pill pill-info">on time</span>');
    return '<tr>' +
      '<td>' + escapeHtml(p.code) + '</td>' +
      '<td>' + escapeHtml(p.title) + '</td>' +
      '<td>' + escapeHtml(fmtDate(p.planned_end)) + '</td>' +
      '<td>' + escapeHtml(fmtDate(p.actual_end)) + '</td>' +
      '<td>' + vCell + '</td>' +
      '<td>' + statusPill(p.status) + '</td>' +
      '</tr>';
  }).join('');

  return [
    '<div class="ss-panel p-5 mb-6">',
    '  <div class="flex items-start justify-between mb-3"><div><h3 class="text-lg font-semibold">Project-level variance</h3>',
    '    <p class="ss-muted text-xs">Δ = actual_end − planned_end (positive = late).</p></div>',
    '    <button class="text-xs ss-muted border border-[var(--ss-line)] rounded-md px-3 py-1.5">⬇ Export CSV</button></div>',
    '  <table class="ss-tbl"><thead><tr><th>Code</th><th>Project</th><th>Planned end</th><th>Actual end</th><th>Variance</th><th>Status</th></tr></thead><tbody>' + projRows + '</tbody></table>',
    '</div>',
    '<div class="ss-panel p-5">',
    '  <h3 class="text-lg font-semibold mb-3">Task-level variance</h3>',
    '  <table class="ss-tbl"><thead><tr><th>Project</th><th>Task</th><th>Assignee</th><th>Expected due</th><th>Actual completed</th><th>Variance</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>',
    '</div>'
  ].join('');
}

/* ----- MIS REPORT 2: Financial Yield ----------------------------- */
function renderYieldReport() {
  // group by client company
  const clients = SEED.companies.filter(c => !c.is_internal);
  const rows = clients.map(c => {
    const projs = SEED.projects.filter(p => p.client_company_id === c.id);
    const quoted = projs.reduce((a,p) => a + Number(p.quotation_amount), 0);
    const invoiced = projs.reduce((a,p) => a + projectInvoicedTotal(p.id), 0);
    const realised = projs.reduce((a,p) =>
      a + SEED.invoices
            .filter(i => i.project_id === p.id && i.status === 'Paid')
            .reduce((s,i) => s + Number(i.amount_issued), 0), 0);
    const yieldPct = quoted ? Math.round(invoiced / quoted * 100) : 0;
    const realisedPct = invoiced ? Math.round(realised / invoiced * 100) : 0;
    return '<tr>' +
      '<td><div class="font-semibold">' + escapeHtml(c.legal_name) + '</div><div class="ss-muted text-xs">' + escapeHtml(c.industry) + '</div></td>' +
      '<td class="font-mono">' + projs.length + '</td>' +
      '<td class="font-mono text-right">' + escapeHtml(fmtCurrency(quoted)) + '</td>' +
      '<td class="font-mono text-right">' + escapeHtml(fmtCurrency(invoiced)) + '</td>' +
      '<td class="font-mono text-right">' + escapeHtml(fmtCurrency(realised)) + '</td>' +
      '<td><div class="flex items-center gap-2 min-w-[150px]"><div class="pbar flex-1"><div style="width:' + Math.min(100,yieldPct) + '%"></div></div><span class="text-xs ss-muted">' + yieldPct + '%</span></div></td>' +
      '<td><div class="flex items-center gap-2 min-w-[150px]"><div class="pbar flex-1"><div style="width:' + Math.min(100,realisedPct) + '%;background:linear-gradient(90deg,#34d399,#22d3ee)"></div></div><span class="text-xs ss-muted">' + realisedPct + '%</span></div></td>' +
    '</tr>';
  }).join('');

  const totalQuoted   = SEED.projects.reduce((a,p) => a + Number(p.quotation_amount), 0);
  const totalInvoiced = SEED.projects.reduce((a,p) => a + projectInvoicedTotal(p.id), 0);
  const totalRealised = SEED.invoices.filter(i => i.status === 'Paid').reduce((a,i) => a + Number(i.amount_issued), 0);

  return [
    '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">',
       kpi('Total quoted',     fmtCurrency(totalQuoted),   '#7c5cff'),
       kpi('Total invoiced',   fmtCurrency(totalInvoiced), '#22d3ee'),
       kpi('Total cash in (Paid)', fmtCurrency(totalRealised), '#34d399'),
    '</div>',
    '<div class="ss-panel p-5">',
    '  <h3 class="text-lg font-semibold mb-1">Yield by Client</h3>',
    '  <p class="ss-muted text-xs mb-4">"Yield %" = invoiced / quoted. "Realised %" = paid / invoiced.</p>',
    '  <table class="ss-tbl"><thead><tr><th>Client</th><th>Projects</th><th class="text-right">Quoted</th><th class="text-right">Invoiced</th><th class="text-right">Realised</th><th>Yield %</th><th>Realised %</th></tr></thead><tbody>' + rows + '</tbody></table>',
    '</div>'
  ].join('');
}

/* ==================================================================
   9.  EVENT WIRING (attached ONCE at boot — never rebound)
   ================================================================== */
function attachOneTimeListeners() {
  // Login persona dropdown
  const sel = document.getElementById('persona-select');
  sel.innerHTML = SEED.users.map(u => {
    const co = findById(SEED.companies, u.company_id);
    return '<option value="' + escapeHtml(u.id) + '">' + escapeHtml(u.full_name + ' · ' + u.role + ' · ' + (co ? co.legal_name : '?')) + '</option>';
  }).join('');

  document.getElementById('login-btn').addEventListener('click', function () {
    login(sel.value);
  });

  document.getElementById('logout-btn').addEventListener('click', logout);

  // Role switcher (event delegation on the row)
  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      switchRole(btn.dataset.role);
    });
  });

  // Sidebar navigation (event delegation: parent listens, looks for data-nav)
  document.getElementById('sidebar-nav').addEventListener('click', function (e) {
    const target = e.target.closest('[data-nav]');
    if (!target) return;
    appState.activeView = target.getAttribute('data-nav');
    renderShell();
  });
}

/* ==================================================================
   10. BOOT
   ================================================================== */
window.addEventListener('DOMContentLoaded', function () {
  // Mermaid: initialise (theme; will run on demand when DFD view is shown)
  try {
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    }
  } catch (err) {
    console.warn('Mermaid init failed: ' + err.message);
  }

  attachOneTimeListeners();
});
</script>
