<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown to HTML Compiler</title>
<style>
  :root{--panel:#11151f;--accent:#34d399;--txt:#e6edf3;--muted:#8b94a3;--line:#262d3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a11;color:var(--txt);font-family:system-ui,sans-serif;padding:14px;height:100vh;display:flex;flex-direction:column}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  h1{font-size:18px;margin-right:auto}
  button,select{background:#1a212e;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);color:#04221a}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;min-height:0}
  textarea{background:#05080f;color:#cbd5e1;border:1px solid var(--line);border-radius:10px;padding:14px;font-family:'SF Mono',monospace;font-size:13px;resize:none;line-height:1.6}
  .preview{background:#fff;color:#1a1a1a;border-radius:10px;padding:24px;overflow:auto;line-height:1.6}
  .preview.dark{background:#0d1117;color:#c9d1d9}
  .preview.sepia{background:#f4ecd8;color:#433422}
  .preview h1,.preview h2,.preview h3{line-height:1.25;margin:.8em 0 .4em}
  .preview h1{border-bottom:1px solid #ddd;padding-bottom:.2em}
  .preview pre{background:#1f2733;color:#9ae6b4;padding:12px;border-radius:8px;overflow:auto}
  .preview code{background:rgba(135,131,120,0.15);padding:.1em .3em;border-radius:4px;font-family:monospace}
  .preview pre code{background:none;padding:0}
  .preview blockquote{border-left:4px solid var(--accent);margin:.5em 0;padding:.2em 1em;color:#666}
  .preview table{border-collapse:collapse;margin:.5em 0}
  .preview th,.preview td{border:1px solid #ccc;padding:6px 12px}
  .preview img{max-width:100%}
  .preview a{color:#2563eb}
  .preview.dark a{color:#58a6ff}
  .preview ul,.preview ol{padding-left:1.5em}
  .preview input[type=checkbox]{margin-right:6px}
  .preview hr{border:none;border-top:1px solid #ccc;margin:1em 0}
</style>
</head>
<body>
<div class="bar">
  <h1>📝 Markdown → HTML Compiler</h1>
  <span style="font-size:12px;color:var(--muted)">theme:</span>
  <button class="theme active" data-t="light">Light</button>
  <button class="theme" data-t="dark">Dark</button>
  <button class="theme" data-t="sepia">Sepia</button>
  <button id="copyHtml">Copy HTML</button>
  <button id="download">⬇ .html</button>
</div>
<div class="layout">
  <textarea id="src" spellcheck="false"></textarea>
  <div class="preview" id="prev"></div>
</div>
<script>
"use strict";
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  return s
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/`([^`]+)`/g,(m,c)=>'<code>'+escapeHtml(c)+'</code>')
    .replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>')
    .replace(/__([^_]+)__/g,'<strong>$1</strong>')
    .replace(/~~([^~]+)~~/g,'<del>$1</del>');
}
function compile(md){
  const lines=md.replace(/\r\n/g,'\n').split('\n');
  let html='',i=0;
  function closeList(){}
  while(i<lines.length){
    let line=lines[i];
    // code fence
    if(/^```/.test(line)){const lang=line.slice(3).trim();let code='';i++;while(i<lines.length&&!/^```/.test(lines[i])){code+=lines[i]+'\n';i++;}i++;html+=`<pre><code data-lang="${lang}">${escapeHtml(code.replace(/\n$/,''))}</code></pre>`;continue;}
    // headings
    let h=line.match(/^(#{1,6})\s+(.*)/);if(h){html+=`<h${h[1].length}>${inline(escapeHtml(h[2]))}</h${h[1].length}>`;i++;continue;}
    // hr
    if(/^(\*\*\*|---|___)\s*$/.test(line)){html+='<hr>';i++;continue;}
    // blockquote
    if(/^>\s?/.test(line)){let bq='';while(i<lines.length&&/^>\s?/.test(lines[i])){bq+=lines[i].replace(/^>\s?/,'')+'\n';i++;}html+='<blockquote>'+compile(bq)+'</blockquote>';continue;}
    // table
    if(/\|/.test(line)&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1])){
      const header=line.split('|').filter(c=>c.trim()!=='');i+=2;let rows='';
      while(i<lines.length&&/\|/.test(lines[i])){const cells=lines[i].split('|').filter(c=>c.trim()!=='');rows+='<tr>'+cells.map(c=>`<td>${inline(escapeHtml(c.trim()))}</td>`).join('')+'</tr>';i++;}
      html+='<table><thead><tr>'+header.map(c=>`<th>${inline(escapeHtml(c.trim()))}</th>`).join('')+'</tr></thead><tbody>'+rows+'</tbody></table>';continue;
    }
    // lists
    if(/^\s*[-*+]\s+/.test(line)||/^\s*\d+\.\s+/.test(line)){
      const ordered=/^\s*\d+\.\s/.test(line);let items='';
      while(i<lines.length&&(/^\s*[-*+]\s+/.test(lines[i])||/^\s*\d+\.\s+/.test(lines[i]))){
        let item=lines[i].replace(/^\s*([-*+]|\d+\.)\s+/,'');
        const task=item.match(/^\[([ xX])\]\s+(.*)/);
        if(task)items+=`<li><input type="checkbox" ${task[1]!==' '?'checked':''} disabled>${inline(escapeHtml(task[2]))}</li>`;
        else items+='<li>'+inline(escapeHtml(item))+'</li>';
        i++;
      }
      html+=ordered?'<ol>'+items+'</ol>':'<ul>'+items+'</ul>';continue;
    }
    // blank
    if(line.trim()===''){i++;continue;}
    // paragraph (gather until blank)
    let para=line;i++;while(i<lines.length&&lines[i].trim()!==''&&!/^(#{1,6}\s|>|\s*[-*+]\s|\s*\d+\.\s|```|---)/.test(lines[i])){para+=' '+lines[i];i++;}
    html+='<p>'+inline(escapeHtml(para))+'</p>';
  }
  return html;
}
const DEMO=`# Markdown Compiler

A **zero-dependency** parser supporting *CommonMark*-ish syntax.

## Features
- Headings, **bold**, *italic*, ~~strike~~, \`code\`
- [Links](https://example.com) and images
- Task lists:
  - [x] Tokenizer
  - [x] Block parser
  - [ ] Footnotes

> Blockquotes nest and render cleanly.

### Code block
\`\`\`js
function fib(n){
  return n<2 ? n : fib(n-1)+fib(n-2);
}
\`\`\`

### Table
| Algo | Complexity |
|------|-----------|
| QuickSort | O(n log n) |
| BubbleSort | O(n²) |

---
Inline \`escaping\` keeps <tags> safe.`;
const prev=document.getElementById('prev'),src=document.getElementById('src');
let lastHtml='';
function render(){lastHtml=compile(src.value);prev.innerHTML=lastHtml;}
src.oninput=render;
document.querySelectorAll('.theme').forEach(b=>b.onclick=function(){document.querySelectorAll('.theme').forEach(x=>x.classList.remove('active'));this.classList.add('active');prev.className='preview '+(this.dataset.t==='light'?'':this.dataset.t);});
document.getElementById('copyHtml').onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(lastHtml);this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy HTML',1200);};
document.getElementById('download').onclick=()=>{const doc=`<!DOCTYPE html><meta charset="utf-8"><body>${lastHtml}`;const a=document.createElement('a');a.download='document.html';a.href=URL.createObjectURL(new Blob([doc],{type:'text/html'}));a.click();};
src.value=DEMO;render();
</script>
</body>
</html>
