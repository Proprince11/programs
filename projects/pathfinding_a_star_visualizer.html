<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A* Pathfinding Visualizer</title>
<style>
  :root{--panel:#11151f;--accent:#22d3ee;--txt:#e6edf3;--muted:#8b94a3;--line:#262d3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a11;color:var(--txt);font-family:system-ui,sans-serif;padding:14px}
  h1{font-size:18px;margin-bottom:10px}
  .layout{display:grid;grid-template-columns:240px 1fr;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  button,select{background:#1a212e;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px;font-size:13px;cursor:pointer;width:100%;margin-top:6px}
  button:hover{border-color:var(--accent)}
  label{font-size:12px;color:var(--muted);display:block;margin-top:10px}
  input[type=range]{width:100%;accent-color:var(--accent)}
  canvas{background:#05080f;border-radius:10px;display:block;cursor:pointer;width:100%}
  .stat{font-size:12px;font-family:monospace;color:var(--muted);margin-top:10px;line-height:1.7}
  .legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;margin-top:10px}
  .legend span{display:flex;align-items:center;gap:4px}.sw{width:12px;height:12px;border-radius:3px}
</style>
</head>
<body>
<h1>🧭 A* Pathfinding Visualizer</h1>
<div class="layout">
  <div class="panel">
    <label>Algorithm</label>
    <select id="algo"><option value="astar">A* (Manhattan)</option><option value="astar-euclid">A* (Euclidean)</option><option value="dijkstra">Dijkstra</option><option value="greedy">Greedy Best-First</option><option value="bfs">Breadth-First</option></select>
    <label>Draw mode</label>
    <select id="mode"><option value="wall">Walls</option><option value="weight">Weighted (cost 5)</option><option value="start">Move Start</option><option value="end">Move End</option></select>
    <button id="run">▶ Find path</button>
    <button id="maze">🌀 Generate maze</button>
    <button id="randomWalls">🎲 Random walls</button>
    <button id="clearPath">Clear path</button>
    <button id="clearAll">Clear all</button>
    <label>Animation speed <span id="spv">20</span></label><input type="range" id="speed" min="1" max="100" value="20">
    <label><input type="checkbox" id="diag" style="width:auto"> allow diagonal</label>
    <div class="legend">
      <span><span class="sw" style="background:#22c55e"></span>start</span>
      <span><span class="sw" style="background:#ef4444"></span>end</span>
      <span><span class="sw" style="background:#1e293b"></span>wall</span>
      <span><span class="sw" style="background:#7c3aed"></span>weight</span>
      <span><span class="sw" style="background:#0e7490"></span>visited</span>
      <span><span class="sw" style="background:#fbbf24"></span>frontier</span>
      <span><span class="sw" style="background:#facc15"></span>path</span>
    </div>
    <div class="stat" id="stat"></div>
  </div>
  <div class="panel"><canvas id="cv"></canvas></div>
</div>
<script>
"use strict";
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let COLS=40,ROWS=28,CELL;
let grid,start,end,running=false;
function alloc(){
  CELL=Math.floor(Math.min(cv.parentElement.clientWidth/COLS,24));
  cv.width=COLS*CELL;cv.height=ROWS*CELL;
  grid=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>({wall:false,weight:1,state:0})));
  start={r:Math.floor(ROWS/2),c:3};end={r:Math.floor(ROWS/2),c:COLS-4};
}
function draw(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=grid[r][c];let col='#0b0f18';
    if(cell.state===1)col='#0e7490';      // visited
    else if(cell.state===2)col='#fbbf24'; // frontier
    if(cell.weight>1)col=cell.state?col:'#5b21b6';
    if(cell.wall)col='#1e293b';
    if(cell.state===3)col='#facc15';       // path
    ctx.fillStyle=col;ctx.fillRect(c*CELL,r*CELL,CELL-1,CELL-1);
  }
  ctx.fillStyle='#22c55e';ctx.fillRect(start.c*CELL,start.r*CELL,CELL-1,CELL-1);
  ctx.fillStyle='#ef4444';ctx.fillRect(end.c*CELL,end.r*CELL,CELL-1,CELL-1);
}
function heuristic(a,b){const algo=document.getElementById('algo').value;const dx=Math.abs(a.c-b.c),dy=Math.abs(a.r-b.r);if(algo==='astar-euclid'||algo==='greedy')return Math.hypot(dx,dy);return dx+dy;}
function neighbors(n){const out=[];const dirs=[[0,1],[1,0],[0,-1],[-1,0]];if(document.getElementById('diag').checked)dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);for(const[dr,dc]of dirs){const r=n.r+dr,c=n.c+dc;if(r>=0&&c>=0&&r<ROWS&&c<COLS&&!grid[r][c].wall)out.push({r,c});}return out;}
async function search(){
  if(running)return;running=true;clearPathState();
  const algo=document.getElementById('algo').value;
  const key=n=>n.r*COLS+n.c;
  const open=[{...start,g:0,f:heuristic(start,end)}];
  const came={},gScore={[key(start)]:0};const visited=new Set();
  const speed=()=>+document.getElementById('speed').value;
  let found=false,steps=0;
  while(open.length){
    // priority: f (astar/dijkstra->g, greedy->h)
    open.sort((a,b)=>{if(algo==='dijkstra')return a.g-b.g;if(algo==='greedy')return heuristic(a,end)-heuristic(b,end);if(algo==='bfs')return 0;return a.f-b.f;});
    const cur=open.shift();const ck=key(cur);
    if(visited.has(ck))continue;visited.add(ck);steps++;
    if(cur.r===end.r&&cur.c===end.c){found=true;break;}
    if(!(cur.r===start.r&&cur.c===start.c))grid[cur.r][cur.c].state=1;
    for(const nb of neighbors(cur)){
      const nk=key(nb);if(visited.has(nk))continue;
      const tentative=gScore[ck]+grid[nb.r][nb.c].weight;
      if(gScore[nk]===undefined||tentative<gScore[nk]){
        gScore[nk]=tentative;came[nk]=cur;
        const f=tentative+heuristic(nb,end);
        open.push({...nb,g:tentative,f});
        if(!(nb.r===end.r&&nb.c===end.c))grid[nb.r][nb.c].state=2;
      }
    }
    if(steps%Math.max(1,Math.round(101-speed()))===0){draw();await new Promise(r=>setTimeout(r,0));}
  }
  // reconstruct
  let pathLen=0;
  if(found){let cur=end;while(cur&&!(cur.r===start.r&&cur.c===start.c)){grid[cur.r][cur.c].state=3;cur=came[key(cur)];pathLen++;await new Promise(r=>setTimeout(r,8));draw();}}
  draw();
  document.getElementById('stat').textContent=`${found?'✓ path found':'✗ no path'}\nnodes explored: ${visited.size}\npath length: ${found?pathLen:'—'}\nalgorithm: ${algo}`;
  running=false;
}
function clearPathState(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].state)grid[r][c].state=0;draw();}
// maze generation (recursive backtracker on cell grid)
function generateMaze(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){grid[r][c].wall=true;grid[r][c].weight=1;grid[r][c].state=0;}
  const stack=[{r:1,c:1}];grid[1][1].wall=false;
  const dirs=[[0,2],[2,0],[0,-2],[-2,0]];
  while(stack.length){
    const cur=stack[stack.length-1];
    const opts=dirs.map(([dr,dc])=>({r:cur.r+dr,c:cur.c+dc,wr:cur.r+dr/2,wc:cur.c+dc/2})).filter(o=>o.r>0&&o.c>0&&o.r<ROWS-1&&o.c<COLS-1&&grid[o.r][o.c].wall);
    if(opts.length){const o=opts[Math.random()*opts.length|0];grid[o.r][o.c].wall=false;grid[o.wr][o.wc].wall=false;stack.push({r:o.r,c:o.c});}
    else stack.pop();
  }
  start={r:1,c:1};end={r:ROWS-2,c:COLS-2};grid[start.r][start.c].wall=false;grid[end.r][end.c].wall=false;draw();
}
// interaction
let painting=false;
function cellFromEvent(e){const rect=cv.getBoundingClientRect();return{c:Math.floor((e.clientX-rect.left)/CELL),r:Math.floor((e.clientY-rect.top)/CELL)};}
function applyPaint(p){if(p.r<0||p.c<0||p.r>=ROWS||p.c>=COLS)return;const mode=document.getElementById('mode').value;const cell=grid[p.r][p.c];
  if(mode==='start'){start=p;}else if(mode==='end'){end=p;}
  else if(mode==='wall'){if((p.r!==start.r||p.c!==start.c)&&(p.r!==end.r||p.c!==end.c)){cell.wall=true;cell.weight=1;}}
  else if(mode==='weight'){cell.weight=5;cell.wall=false;}
  draw();}
cv.addEventListener('mousedown',e=>{painting=true;applyPaint(cellFromEvent(e));});
cv.addEventListener('mousemove',e=>{if(painting)applyPaint(cellFromEvent(e));});
window.addEventListener('mouseup',()=>painting=false);
cv.addEventListener('contextmenu',e=>{e.preventDefault();const p=cellFromEvent(e);grid[p.r][p.c].wall=false;grid[p.r][p.c].weight=1;draw();});
document.getElementById('run').onclick=search;
document.getElementById('maze').onclick=generateMaze;
document.getElementById('randomWalls').onclick=()=>{for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){grid[r][c].wall=Math.random()<0.25&&!(r===start.r&&c===start.c)&&!(r===end.r&&c===end.c);grid[r][c].state=0;}draw();};
document.getElementById('clearPath').onclick=clearPathState;
document.getElementById('clearAll').onclick=()=>{alloc();draw();};
document.getElementById('speed').oninput=function(){document.getElementById('spv').textContent=this.value;};
window.addEventListener('resize',()=>{const old=grid;alloc();draw();});
alloc();draw();
</script>
</body>
</html>
