<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Entropy Analyzer</title>
<style>
  :root{--panel:#11151f;--accent:#34d399;--txt:#e6edf3;--muted:#8b94a3;--line:#262d3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a11;color:var(--txt);font-family:system-ui,sans-serif;padding:18px;max-width:820px;margin:0 auto}
  h1{font-size:19px;margin-bottom:14px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  #pw{width:100%;background:#05080f;border:2px solid var(--line);color:var(--txt);padding:14px;border-radius:10px;font-family:monospace;font-size:18px}
  .meter{height:16px;border-radius:8px;background:#1a212e;overflow:hidden;margin:14px 0}
  .meter>div{height:100%;transition:width .25s,background .25s}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:#05080f;border:1px solid var(--line);border-radius:10px;padding:12px}
  .stat .v{font-size:24px;font-weight:700;font-family:monospace}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .crack td{padding:6px;border-bottom:1px solid var(--line);font-family:monospace;font-size:13px}
  .crack table{width:100%;border-collapse:collapse}
  .checks div{padding:5px 0;font-size:13px}
  .checks .pass{color:var(--accent)}.checks .fail{color:#f87171}
  label{font-size:12px;color:var(--muted)}
  .verdict{font-size:20px;font-weight:700;text-align:center;padding:8px}
</style>
</head>
<body>
<h1>🔑 Password Entropy Analyzer <span style="font-size:12px;color:var(--muted)">— Shannon bits &amp; crack-time estimation</span></h1>
<div class="panel">
  <input id="pw" placeholder="Type a password to analyze (stays in your browser)" value="Tr0ub4dor&3" spellcheck="false" autocomplete="off">
  <label style="display:block;margin-top:8px"><input type="checkbox" id="show"> show characters</label>
  <div class="meter"><div id="bar" style="width:0%"></div></div>
  <div class="verdict" id="verdict"></div>
</div>
<div class="panel">
  <div class="grid">
    <div class="stat"><div class="l">Entropy</div><div class="v" id="entropy">0</div><span style="color:var(--muted);font-size:11px">bits</span></div>
    <div class="stat"><div class="l">Character pool</div><div class="v" id="pool">0</div><span style="color:var(--muted);font-size:11px">symbols</span></div>
    <div class="stat"><div class="l">Length</div><div class="v" id="len">0</div></div>
    <div class="stat"><div class="l">Combinations</div><div class="v" id="combos" style="font-size:16px">0</div></div>
  </div>
</div>
<div class="panel">
  <h2 style="font-size:13px;color:var(--muted);margin-bottom:10px">ESTIMATED CRACK TIME (offline, by attacker speed)</h2>
  <div class="crack"><table id="crackTable"></table></div>
</div>
<div class="panel">
  <h2 style="font-size:13px;color:var(--muted);margin-bottom:10px">COMPOSITION &amp; WEAKNESS CHECKS</h2>
  <div class="checks" id="checks"></div>
</div>
<script>
"use strict";
const COMMON=['password','123456','12345678','qwerty','abc123','letmein','admin','welcome','monkey','dragon','111111','iloveyou','000000','password1'];
const SPEEDS=[
  {name:'Online throttled (10/s)',rate:10},
  {name:'Online unthrottled (1k/s)',rate:1e3},
  {name:'Slow hash bcrypt GPU (10k/s)',rate:1e4},
  {name:'Fast hash SHA-256 GPU (10B/s)',rate:1e10},
  {name:'Nation-state cluster (100T/s)',rate:1e14}
];
function poolSize(pw){let p=0;if(/[a-z]/.test(pw))p+=26;if(/[A-Z]/.test(pw))p+=26;if(/[0-9]/.test(pw))p+=10;if(/[^a-zA-Z0-9]/.test(pw))p+=33;return p;}
function fmtTime(seconds){
  if(seconds<1)return'instant';
  const units=[['century',3.156e9],['year',3.156e7],['day',86400],['hour',3600],['minute',60],['second',1]];
  for(const[name,s] of units){if(seconds>=s){const v=seconds/s;return v>=1e6?v.toExponential(2)+' '+name+'s':Math.round(v).toLocaleString()+' '+name+(Math.round(v)!==1?'s':'');}}
  return seconds.toFixed(1)+'s';
}
function analyze(){
  const pw=document.getElementById('pw').value;
  const pool=poolSize(pw);
  const entropy=pw.length?pw.length*Math.log2(pool||1):0;
  const combos=Math.pow(pool,pw.length);
  document.getElementById('entropy').textContent=entropy.toFixed(1);
  document.getElementById('pool').textContent=pool;
  document.getElementById('len').textContent=pw.length;
  document.getElementById('combos').textContent=pw.length?(combos>1e15?combos.toExponential(2):combos.toLocaleString()):'0';
  // meter
  const bar=document.getElementById('bar'),verdict=document.getElementById('verdict');
  const pct=Math.min(100,entropy/128*100);bar.style.width=pct+'%';
  let label,color;
  if(entropy<28){label='Very Weak';color='#f87171';}
  else if(entropy<36){label='Weak';color='#fb923c';}
  else if(entropy<60){label='Reasonable';color='#fbbf24';}
  else if(entropy<128){label='Strong';color='#4ade80';}
  else{label='Very Strong';color='#22d3ee';}
  bar.style.background=color;verdict.style.color=color;verdict.textContent=label+` (${entropy.toFixed(0)} bits)`;
  // crack table
  document.getElementById('crackTable').innerHTML=SPEEDS.map(s=>{const secs=combos/2/s.rate;return `<tr><td>${s.name}</td><td style="color:${color};text-align:right">${pw.length?fmtTime(secs):'—'}</td></tr>`;}).join('');
  // checks
  const checks=[
    ['Length ≥ 12',pw.length>=12],
    ['Lowercase letters',/[a-z]/.test(pw)],
    ['Uppercase letters',/[A-Z]/.test(pw)],
    ['Digits',/[0-9]/.test(pw)],
    ['Symbols',/[^a-zA-Z0-9]/.test(pw)],
    ['Not a common password',!COMMON.includes(pw.toLowerCase())],
    ['No simple repeats (aaa, 111)',!/(.)\1{2,}/.test(pw)],
    ['No sequential runs (abc, 123)',!hasSequence(pw)]
  ];
  document.getElementById('checks').innerHTML=checks.map(([n,ok])=>`<div class="${ok?'pass':'fail'}">${ok?'✓':'✗'} ${n}</div>`).join('');
}
function hasSequence(pw){const l=pw.toLowerCase();for(let i=0;i<l.length-2;i++){const a=l.charCodeAt(i),b=l.charCodeAt(i+1),c=l.charCodeAt(i+2);if(b===a+1&&c===b+1)return true;if(b===a-1&&c===b-1)return true;}return false;}
document.getElementById('pw').oninput=analyze;
document.getElementById('show').onchange=e=>document.getElementById('pw').type=e.target.checked?'text':'password';
document.getElementById('pw').type='text';
analyze();
</script>
</body>
</html>
