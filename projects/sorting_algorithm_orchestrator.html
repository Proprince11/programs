<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Algorithm Orchestrator</title>
<style>
  :root{--panel:#11151f;--accent:#f59e0b;--txt:#e6edf3;--muted:#8b94a3;--line:#262d3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a11;color:var(--txt);font-family:system-ui,sans-serif;padding:14px}
  h1{font-size:18px;margin-bottom:10px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  button{background:#1a212e;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);color:#241803}
  select{background:#0a0e16;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:7px}
  label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  input[type=range]{accent-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
  .card h3{font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between}
  canvas{width:100%;background:#05080f;border-radius:6px;display:block}
  .meta{font-size:11px;font-family:monospace;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<h1>📊 Sorting Algorithm Orchestrator — visual + auditory comparison</h1>
<div class="bar">
  <button id="gen">🎲 New array</button>
  <button id="run" class="active">▶ Sort all</button>
  <button id="stop">⏸ Stop</button>
  <label>Size <input type="range" id="size" min="10" max="200" value="60"><span id="sizev">60</span></label>
  <label>Speed <input type="range" id="speed" min="1" max="100" value="40"><span id="spv">40</span></label>
  <label>Distribution <select id="dist"><option>random</option><option>nearly-sorted</option><option>reversed</option><option>few-unique</option></select></label>
  <label><input type="checkbox" id="sound" checked> 🔊 sound</label>
</div>
<div class="grid" id="grid"></div>
<script>
"use strict";
const ALGOS=['QuickSort','MergeSort','HeapSort','RadixSort','BubbleSort','InsertionSort'];
let base=[];let runners=[];let audio=null;
function P(id){return +document.getElementById(id).value;}
function genArray(){
  const n=P('size');const d=document.getElementById('dist').value;
  base=Array.from({length:n},(_,i)=>i+1);
  if(d==='random'){for(let i=n-1;i>0;i--){const j=Math.random()*(i+1)|0;[base[i],base[j]]=[base[j],base[i]];}}
  else if(d==='reversed')base.reverse();
  else if(d==='nearly-sorted'){for(let k=0;k<n*0.08;k++){const i=Math.random()*n|0,j=Math.random()*n|0;[base[i],base[j]]=[base[j],base[i]];}}
  else if(d==='few-unique')base=base.map(()=>1+(Math.random()*5|0)*Math.floor(n/5));
  buildCards();
}
// each algorithm is a generator yielding {array, hi:[indices], type:'compare'|'swap'|'sorted'}
function* quick(a){a=a.slice();yield {a,hi:[]};function* qs(lo,hi){if(lo>=hi)return;const pivot=a[hi];let i=lo;for(let j=lo;j<hi;j++){yield{a,hi:[j,hi]};if(a[j]<pivot){[a[i],a[j]]=[a[j],a[i]];yield{a,hi:[i,j],swap:1};i++;}}[a[i],a[hi]]=[a[hi],a[i]];yield{a,hi:[i,hi],swap:1};yield* qs(lo,i-1);yield* qs(i+1,hi);}yield* qs(0,a.length-1);yield{a,done:1};}
function* merge(a){a=a.slice();function* ms(l,r){if(r-l<=1)return;const m=(l+r)>>1;yield* ms(l,m);yield* ms(m,r);const tmp=[];let i=l,j=m;while(i<m&&j<r){yield{a,hi:[i,j]};if(a[i]<=a[j])tmp.push(a[i++]);else tmp.push(a[j++]);}while(i<m)tmp.push(a[i++]);while(j<r)tmp.push(a[j++]);for(let k=0;k<tmp.length;k++){a[l+k]=tmp[k];yield{a,hi:[l+k],swap:1};}}yield* ms(0,a.length);yield{a,done:1};}
function* heap(a){a=a.slice();const n=a.length;function* down(i,n){let largest=i,l=2*i+1,r=2*i+2;if(l<n){yield{a,hi:[l,largest]};if(a[l]>a[largest])largest=l;}if(r<n){yield{a,hi:[r,largest]};if(a[r]>a[largest])largest=r;}if(largest!==i){[a[i],a[largest]]=[a[largest],a[i]];yield{a,hi:[i,largest],swap:1};yield* down(largest,n);}}for(let i=(n>>1)-1;i>=0;i--)yield* down(i,n);for(let i=n-1;i>0;i--){[a[0],a[i]]=[a[i],a[0]];yield{a,hi:[0,i],swap:1};yield* down(0,i);}yield{a,done:1};}
function* radix(a){a=a.slice();const max=Math.max(...a);for(let exp=1;Math.floor(max/exp)>0;exp*=10){const out=new Array(a.length),cnt=new Array(10).fill(0);for(let i=0;i<a.length;i++){cnt[Math.floor(a[i]/exp)%10]++;yield{a,hi:[i]};}for(let i=1;i<10;i++)cnt[i]+=cnt[i-1];for(let i=a.length-1;i>=0;i--){const d=Math.floor(a[i]/exp)%10;out[--cnt[d]]=a[i];}for(let i=0;i<a.length;i++){a[i]=out[i];yield{a,hi:[i],swap:1};}}yield{a,done:1};}
function* bubble(a){a=a.slice();for(let i=0;i<a.length;i++)for(let j=0;j<a.length-i-1;j++){yield{a,hi:[j,j+1]};if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];yield{a,hi:[j,j+1],swap:1};}}yield{a,done:1};}
function* insertion(a){a=a.slice();for(let i=1;i<a.length;i++){let key=a[i],j=i-1;while(j>=0&&a[j]>key){yield{a,hi:[j,j+1]};a[j+1]=a[j];j--;yield{a,hi:[j+1],swap:1};}a[j+1]=key;}yield{a,done:1};}
const GEN={QuickSort:quick,MergeSort:merge,HeapSort:heap,RadixSort:radix,BubbleSort:bubble,InsertionSort:insertion};
const BIG={QuickSort:'O(n log n) avg · O(n²) worst',MergeSort:'O(n log n) · stable',HeapSort:'O(n log n) · in-place',RadixSort:'O(nk) · non-comparison',BubbleSort:'O(n²) · educational',InsertionSort:'O(n²) · fast on near-sorted'};
function buildCards(){
  const grid=document.getElementById('grid');grid.innerHTML='';runners=[];
  ALGOS.forEach(name=>{
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<h3><span>${name}</span><span style="color:var(--accent)" id="c_${name}">0 ops</span></h3><canvas id="cv_${name}" height="160"></canvas><div class="meta">${BIG[name]}</div>`;
    grid.appendChild(card);
    const cv=card.querySelector('canvas');
    runners.push({name,cv,ctx:cv.getContext('2d'),gen:null,arr:base.slice(),hi:[],ops:0,done:false});
  });
  setTimeout(()=>runners.forEach(r=>{r.cv.width=r.cv.clientWidth;drawR(r);}),0);
}
function drawR(r){
  const ctx=r.ctx,W=r.cv.width,H=r.cv.height;ctx.fillStyle='#05080f';ctx.fillRect(0,0,W,H);
  const n=r.arr.length,bw=W/n,mx=Math.max(...r.arr);
  for(let i=0;i<n;i++){const h=r.arr[i]/mx*(H-4);ctx.fillStyle=r.done?'#4ade80':r.hi.includes(i)?'#f87171':`hsl(${r.arr[i]/mx*200+200} 70% 55%)`;ctx.fillRect(i*bw,H-h,Math.max(1,bw-1),h);}
}
function ensureAudio(){if(!audio)audio=new (window.AudioContext||window.webkitAudioContext)();}
function beep(val,mx){if(!document.getElementById('sound').checked)return;ensureAudio();const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=200+val/mx*600;o.type='triangle';g.gain.value=0.02;o.connect(g);g.connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+0.04);o.stop(audio.currentTime+0.05);}
let playing=false;
function start(){runners.forEach(r=>{r.gen=GEN[r.name](base.slice());r.arr=base.slice();r.ops=0;r.done=false;r.hi=[];});playing=true;ensureAudio();}
function tick(){
  if(!playing)return;
  const steps=P('speed');
  runners.forEach(r=>{if(r.done)return;for(let s=0;s<steps;s++){const nx=r.gen.next();if(nx.done||(nx.value&&nx.value.done)){r.done=true;r.arr=nx.value?nx.value.a:r.arr;break;}const v=nx.value;r.arr=v.a;r.hi=v.hi||[];r.ops++;if(v.swap){beep(r.arr[v.hi[0]]||0,r.arr.length);}}drawR(r);document.getElementById('c_'+r.name).textContent=r.ops+' ops';});
}
function loop(){requestAnimationFrame(loop);tick();}
document.getElementById('gen').onclick=genArray;
document.getElementById('run').onclick=function(){this.classList.add('active');start();};
document.getElementById('stop').onclick=()=>{playing=false;};
['size','speed'].forEach(id=>document.getElementById(id).oninput=function(){document.getElementById(id==='size'?'sizev':'spv').textContent=this.value;if(id==='size')genArray();});
document.getElementById('dist').onchange=genArray;
window.addEventListener('resize',()=>runners.forEach(r=>{r.cv.width=r.cv.clientWidth;drawR(r);}));
genArray();loop();
</script>
</body>
</html>
