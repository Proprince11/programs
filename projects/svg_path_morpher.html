<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Path Morpher</title>
<style>
  :root{--bg:#0f1320;--panel:#171c2e;--accent:#a78bfa;--txt:#e8eaf2;--muted:#8a90a8;--line:#2a3048}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;padding:18px}
  h1{font-size:19px;margin-bottom:12px}
  .layout{display:grid;grid-template-columns:1fr 360px;gap:18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  svg{width:100%;background:#080b14;border-radius:10px;display:block}
  textarea{width:100%;height:70px;background:#080b14;color:#9ae6b4;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:monospace;font-size:12px;resize:vertical}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
  input[type=range]{width:100%;accent-color:var(--accent)}
  button{background:#232a44;border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;margin:4px 4px 0 0}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);color:#1a1030}
  .presets button{font-size:11px;padding:6px 8px}
  .out{font-family:monospace;font-size:11px;color:#9ae6b4;word-break:break-all;background:#080b14;padding:8px;border-radius:8px;max-height:120px;overflow:auto;margin-top:8px}
  select{background:#080b14;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px}
</style>
</head>
<body>
<h1>🌀 SVG Path Morpher — point-resampled interpolation engine</h1>
<div class="layout">
  <div class="panel">
    <svg id="stage" viewBox="0 0 400 400"></svg>
  </div>
  <div class="panel">
    <label>Shape A path</label><textarea id="pathA">M200,40 L360,360 L40,360 Z</textarea>
    <label>Shape B path</label><textarea id="pathB">M200,40 C320,40 360,200 200,360 C40,200 80,40 200,40 Z</textarea>
    <div class="presets">
      <button data-a="M200,40 L360,360 L40,360 Z">Triangle→A</button>
      <button data-b="M200,40 C320,40 360,200 200,360 C40,200 80,40 200,40 Z">Heart→B</button>
      <button data-b="M200,60 a140,140 0 1,0 0.1,0 Z">Circle→B</button>
      <button data-a="M80,80 H320 V320 H80 Z">Square→A</button>
      <button data-b="M200,30 L243,150 L370,150 L268,228 L307,350 L200,275 L93,350 L132,228 L30,150 L157,150 Z">Star→B</button>
    </div>
    <label>Morph t = <span id="tv">0.00</span></label>
    <input type="range" id="t" min="0" max="1" step="0.001" value="0">
    <label>Easing</label>
    <select id="ease"><option value="linear">linear</option><option value="cubic">easeInOutCubic</option><option value="elastic">elastic</option><option value="back">back</option></select>
    <label>Sample resolution <span id="rv">120</span> pts</label>
    <input type="range" id="res" min="24" max="400" step="4" value="120">
    <div>
      <button id="play" class="active">▶ Auto-loop</button>
      <button id="copy">Copy current d</button>
    </div>
    <label>Keyframe export (5 steps)</label>
    <div class="out" id="kf"></div>
  </div>
</div>
<script>
"use strict";
const NS="http://www.w3.org/2000/svg";
const stage=document.getElementById('stage');
// helper hidden path to measure geometry
const measure=document.createElementNS(NS,'path');
const morphPath=document.createElementNS(NS,'path');
morphPath.setAttribute('fill','rgba(167,139,250,0.25)');
morphPath.setAttribute('stroke','#a78bfa');morphPath.setAttribute('stroke-width','2');
const ghostA=document.createElementNS(NS,'path');ghostA.setAttribute('fill','none');ghostA.setAttribute('stroke','#2dd4bf');ghostA.setAttribute('stroke-width','1');ghostA.setAttribute('stroke-dasharray','4 4');ghostA.setAttribute('opacity','0.4');
const ghostB=document.createElementNS(NS,'path');ghostB.setAttribute('fill','none');ghostB.setAttribute('stroke','#fb7185');ghostB.setAttribute('stroke-width','1');ghostB.setAttribute('stroke-dasharray','4 4');ghostB.setAttribute('opacity','0.4');
stage.append(ghostA,ghostB,morphPath);

function samplePath(d,n){
  measure.setAttribute('d',d);
  const len=measure.getTotalLength();
  const pts=[];
  for(let i=0;i<n;i++){const p=measure.getPointAtLength(len*i/n);pts.push([p.x,p.y]);}
  return pts;
}
// align starting index of B to minimize distance to A[0]
function align(a,b){
  let best=0,bestD=Infinity;
  for(let off=0;off<b.length;off++){
    let dx=a[0][0]-b[off][0],dy=a[0][1]-b[off][1];const dd=dx*dx+dy*dy;
    if(dd<bestD){bestD=dd;best=off;}
  }
  return b.map((_,i)=>b[(i+best)%b.length]);
}
const eases={
  linear:t=>t,
  cubic:t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,
  elastic:t=>t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*((2*Math.PI)/3))+1,
  back:t=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
};
function toPath(pts){return 'M'+pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' L ')+' Z';}
let A=[],B=[];
function resample(){
  const n=+res.value;rv.textContent=n;
  A=samplePath(pathA.value,n);
  B=align(A,samplePath(pathB.value,n));
  ghostA.setAttribute('d',pathA.value);ghostB.setAttribute('d',pathB.value);
  renderKeyframes();update();
}
function lerpShape(t){
  const e=eases[ease.value](t);
  return A.map((p,i)=>[p[0]+(B[i][0]-p[0])*e,p[1]+(B[i][1]-p[1])*e]);
}
function update(){
  const t=+document.getElementById('t').value;tv.textContent=t.toFixed(2);
  morphPath.setAttribute('d',toPath(lerpShape(t)));
}
function renderKeyframes(){
  let html='';
  for(let i=0;i<=4;i++){const t=i/4;html+=`<div><b>${(t*100)|0}%:</b> ${toPath(lerpShape(t)).slice(0,90)}…</div>`;}
  document.getElementById('kf').innerHTML=html;
}
const pathA=document.getElementById('pathA'),pathB=document.getElementById('pathB'),res=document.getElementById('res'),ease=document.getElementById('ease'),tv=document.getElementById('tv'),rv=document.getElementById('rv');
pathA.oninput=pathB.oninput=res.oninput=ease.onchange=resample;
document.getElementById('t').oninput=()=>{update();};
document.querySelectorAll('.presets button').forEach(b=>b.onclick=()=>{if(b.dataset.a)pathA.value=b.dataset.a;if(b.dataset.b)pathB.value=b.dataset.b;resample();});
let playing=true,dir=1,pt=0;
document.getElementById('play').onclick=function(){playing=!playing;this.classList.toggle('active',playing);};
document.getElementById('copy').onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(morphPath.getAttribute('d'));};
function loop(){requestAnimationFrame(loop);if(!playing)return;pt+=0.006*dir;if(pt>=1){pt=1;dir=-1;}if(pt<=0){pt=0;dir=1;}document.getElementById('t').value=pt;update();}
resample();loop();
</script>
</body>
</html>
