<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris — 7-Bag System</title>
<style>
  :root{--panel:#11151f;--accent:#22d3ee;--txt:#e6edf3;--muted:#8b94a3;--line:#262d3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a11;color:var(--txt);font-family:system-ui,sans-serif;padding:14px;display:flex;justify-content:center}
  .game{display:flex;gap:16px;align-items:flex-start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  canvas{background:#05080f;border-radius:8px;display:block}
  h1{font-size:16px;margin-bottom:10px}
  .side{width:150px}
  .box{background:#05080f;border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:10px}
  .box h2{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .stat{font-size:13px;font-family:monospace;line-height:1.9}
  .stat b{color:var(--accent)}
  .keys{font-size:11px;color:var(--muted);line-height:1.7}
  .keys b{color:var(--txt)}
  button{background:#1a212e;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px;width:100%;cursor:pointer;margin-top:6px}
  button:hover{border-color:var(--accent)}
</style>
</head>
<body>
<div class="game">
  <div class="panel side">
    <h1>🧱 TETRIS</h1>
    <div class="box"><h2>Hold</h2><canvas id="hold" width="120" height="80"></canvas></div>
    <div class="box stat"><h2>Stats</h2>Score <b id="score">0</b><br>Lines <b id="lines">0</b><br>Level <b id="level">1</b><br>B2B <b id="b2b">0</b></div>
    <button id="restart">⟳ New game</button>
  </div>
  <div class="panel"><canvas id="board" width="300" height="600"></canvas></div>
  <div class="panel side">
    <div class="box"><h2>Next (7-bag)</h2><canvas id="next" width="120" height="320"></canvas></div>
    <div class="box keys"><h2>Controls</h2>
      <b>← →</b> move<br><b>↓</b> soft drop<br><b>Space</b> hard drop<br><b>↑ / X</b> rotate CW<br><b>Z</b> rotate CCW<br><b>C</b> hold<br><b>P</b> pause</div>
  </div>
</div>
<script>
"use strict";
const COLS=10,ROWS=20,CELL=30;
const board=document.getElementById('board'),ctx=board.getContext('2d');
const nextC=document.getElementById('next'),nctx=nextC.getContext('2d');
const holdC=document.getElementById('hold'),hctx=holdC.getContext('2d');
const COLORS={I:'#22d3ee',O:'#facc15',T:'#a855f7',S:'#22c55e',Z:'#ef4444',J:'#3b82f6',L:'#f97316'};
const SHAPES={
  I:[[0,1],[1,1],[2,1],[3,1]],O:[[1,0],[2,0],[1,1],[2,1]],T:[[1,0],[0,1],[1,1],[2,1]],
  S:[[1,0],[2,0],[0,1],[1,1]],Z:[[0,0],[1,0],[1,1],[2,1]],J:[[0,0],[0,1],[1,1],[2,1]],L:[[2,0],[0,1],[1,1],[2,1]]
};
// rotation via matrix for each piece in a 4x4 / 3x3 bounding box. We'll store states.
const STATES=buildStates();
function buildStates(){
  // generate 4 rotation states by rotating coords in bounding box
  const out={};
  for(const k in SHAPES){
    const size=k==='I'?4:k==='O'?4:3;
    let cells=SHAPES[k].map(c=>[c[0],c[1]]);
    // adjust O/I baseline to box
    const states=[cells];
    for(let i=0;i<3;i++){cells=cells.map(([x,y])=>[size-1-y,x]);states.push(cells);}
    out[k]=states;
  }
  return out;
}
// SRS kick tables
const KICKS={
  JLSTZ:{'0>1':[[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],'1>0':[[0,0],[1,0],[1,-1],[0,2],[1,2]],'1>2':[[0,0],[1,0],[1,-1],[0,2],[1,2]],'2>1':[[0,0],[-1,0],[-1,1],[0,-2],[-1,-2]],'2>3':[[0,0],[1,0],[1,1],[0,-2],[1,-2]],'3>2':[[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],'3>0':[[0,0],[-1,0],[-1,-1],[0,2],[-1,2]],'0>3':[[0,0],[1,0],[1,1],[0,-2],[1,-2]]},
  I:{'0>1':[[0,0],[-2,0],[1,0],[-2,-1],[1,2]],'1>0':[[0,0],[2,0],[-1,0],[2,1],[-1,-2]],'1>2':[[0,0],[-1,0],[2,0],[-1,2],[2,-1]],'2>1':[[0,0],[1,0],[-2,0],[1,-2],[-2,1]],'2>3':[[0,0],[2,0],[-1,0],[2,1],[-1,-2]],'3>2':[[0,0],[-2,0],[1,0],[-2,-1],[1,2]],'3>0':[[0,0],[1,0],[-2,0],[1,-2],[-2,1]],'0>3':[[0,0],[-1,0],[2,0],[-1,2],[2,-1]]}
};
let grid,cur,bag,nextQueue,hold,canHold,score,lines,level,b2b,dropTimer,lockTimer,lockResets,gameover,paused;
function newBag(){const b=['I','O','T','S','Z','J','L'];for(let i=b.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]];}return b;}
function refill(){while(nextQueue.length<7){if(bag.length===0)bag=newBag();nextQueue.push(bag.shift());}}
function spawn(type){
  type=type||nextQueue.shift();refill();
  const p={type,rot:0,x:type==='I'?3:type==='O'?3:3,y:type==='I'? -1: -1,cells:STATES[type][0]};
  // position: standard spawn near top
  p.x=3;p.y=0;
  cur=p;
  if(collide(cur,0,0,cur.rot)){gameover=true;}
  canHold=true;lockTimer=0;lockResets=0;
}
function init(){
  grid=Array.from({length:ROWS},()=>new Array(COLS).fill(null));
  bag=newBag();nextQueue=[];refill();hold=null;canHold=true;score=0;lines=0;level=1;b2b=0;
  dropTimer=0;lockTimer=0;lockResets=0;gameover=false;paused=false;
  spawn();updateHUD();
}
function cellsOf(p,rot){return STATES[p.type][((rot%4)+4)%4];}
function collide(p,dx,dy,rot){
  for(const[cx,cy]of cellsOf(p,rot)){const x=p.x+cx+dx,y=p.y+cy+dy;if(x<0||x>=COLS||y>=ROWS)return true;if(y>=0&&grid[y][x])return true;}
  return false;
}
function lock(){
  for(const[cx,cy]of cellsOf(cur,cur.rot)){const x=cur.x+cx,y=cur.y+cy;if(y>=0)grid[y][x]=cur.type;}
  // clear lines
  let cleared=0;for(let y=ROWS-1;y>=0;y--){if(grid[y].every(c=>c)){grid.splice(y,1);grid.unshift(new Array(COLS).fill(null));cleared++;y++;}}
  if(cleared>0){
    const base=[0,100,300,500,800][cleared];
    let pts=base*level;
    if(cleared===4){b2b++;if(b2b>1)pts=Math.round(pts*1.5);}else b2b=0;
    score+=pts;lines+=cleared;level=1+Math.floor(lines/10);
  }
  spawn();updateHUD();
}
function move(dx,dy){if(gameover||paused)return false;if(!collide(cur,dx,dy,cur.rot)){cur.x+=dx;cur.y+=dy;if(dx!==0&&lockTimer>0&&lockResets<15){lockTimer=0;lockResets++;}return true;}return false;}
function rotate(dir){
  if(gameover||paused)return;
  const from=cur.rot,to=((from+dir)%4+4)%4;
  const table=cur.type==='I'?KICKS.I:cur.type==='O'?null:KICKS.JLSTZ;
  const kicks=table?table[from+'>'+to]||[[0,0]]:[[0,0]];
  for(const[kx,ky]of kicks){if(!collide(cur,kx,-ky,to)){cur.x+=kx;cur.y-=ky;cur.rot=to;if(lockTimer>0&&lockResets<15){lockTimer=0;lockResets++;}return;}}
}
function hardDrop(){if(gameover||paused)return;let d=0;while(!collide(cur,0,d+1,cur.rot))d++;cur.y+=d;score+=d*2;lock();dropTimer=0;}
function holdPiece(){if(!canHold||gameover||paused)return;const t=cur.type;if(hold){const h=hold;hold=t;spawn(h);}else{hold=t;spawn();}canHold=false;updateHUD();}
function ghostY(){let d=0;while(!collide(cur,0,d+1,cur.rot))d++;return cur.y+d;}
function draw(){
  ctx.fillStyle='#05080f';ctx.fillRect(0,0,board.width,board.height);
  // grid lines
  ctx.strokeStyle='#101725';for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke();}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke();}
  // settled
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(grid[y][x])block(ctx,x,y,COLORS[grid[y][x]]);
  if(!gameover){
    // ghost
    const gy=ghostY();for(const[cx,cy]of cellsOf(cur,cur.rot)){const x=cur.x+cx,y=gy+cy;if(y>=0){ctx.globalAlpha=0.25;block(ctx,x,y,COLORS[cur.type]);ctx.globalAlpha=1;}}
    // current
    for(const[cx,cy]of cellsOf(cur,cur.rot)){const x=cur.x+cx,y=cur.y+cy;if(y>=0)block(ctx,x,y,COLORS[cur.type]);}
  }else{ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,board.width,board.height);ctx.fillStyle='#ef4444';ctx.font='bold 34px system-ui';ctx.textAlign='center';ctx.fillText('GAME OVER',board.width/2,board.height/2);}
  if(paused){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,board.width,board.height);ctx.fillStyle='#22d3ee';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.fillText('PAUSED',board.width/2,board.height/2);}
  drawPreviews();
}
function block(c,x,y,color){c.fillStyle=color;c.fillRect(x*CELL+1,y*CELL+1,CELL-2,CELL-2);c.fillStyle='rgba(255,255,255,0.25)';c.fillRect(x*CELL+1,y*CELL+1,CELL-2,4);}
function drawMini(c,type,ox,oy,scale){const cells=STATES[type][0];c.fillStyle=COLORS[type];for(const[cx,cy]of cells){c.fillRect(ox+cx*scale+1,oy+cy*scale+1,scale-2,scale-2);}}
function drawPreviews(){
  nctx.fillStyle='#05080f';nctx.fillRect(0,0,nextC.width,nextC.height);
  nextQueue.slice(0,5).forEach((t,i)=>drawMini(nctx,t,18,10+i*62,22));
  hctx.fillStyle='#05080f';hctx.fillRect(0,0,holdC.width,holdC.height);
  if(hold)drawMini(hctx,hold,18,14,22);
}
function updateHUD(){document.getElementById('score').textContent=score;document.getElementById('lines').textContent=lines;document.getElementById('level').textContent=level;document.getElementById('b2b').textContent=Math.max(0,b2b-1);}
let last=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=now-last;last=now;
  if(!gameover&&!paused){
    const gravity=Math.max(40,800-(level-1)*70);
    dropTimer+=dt;
    if(dropTimer>=gravity){dropTimer=0;if(!move(0,1)){lockTimer+=gravity;}}
    // lock delay: if resting
    if(collide(cur,0,1,cur.rot)){lockTimer+=dt;if(lockTimer>=500)lock();}else lockTimer=0;
  }
  draw();
}
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())||['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key))e.preventDefault();
  if(k==='arrowleft')move(-1,0);
  else if(k==='arrowright')move(1,0);
  else if(k==='arrowdown'){if(move(0,1))score+=1;updateHUD();}
  else if(k==='arrowup'||k==='x')rotate(1);
  else if(k==='z')rotate(-1);
  else if(k===' ')hardDrop();
  else if(k==='c')holdPiece();
  else if(k==='p')paused=!paused;
});
document.getElementById('restart').onclick=init;
init();requestAnimationFrame(loop);
</script>
</body>
</html>
