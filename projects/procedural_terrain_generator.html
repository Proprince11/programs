<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Terrain Generator</title>
<style>
  :root{--bg:#0c1018;--panel:#151b26;--accent:#4ade80;--txt:#e6edf3;--muted:#8b94a3;--line:#262e3d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;padding:16px}
  h1{font-size:19px;margin-bottom:12px}
  .layout{display:grid;grid-template-columns:300px 1fr;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:12px 0 4px}
  input[type=range]{width:100%;accent-color:var(--accent)}
  button{background:#1f2733;border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:8px;cursor:pointer;margin:4px 4px 0 0;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);color:#04240f}
  canvas{width:100%;background:#05080d;border-radius:10px;display:block;image-rendering:pixelated}
  .legend{display:flex;gap:6px;margin-top:10px;font-size:10px;flex-wrap:wrap}
  .legend span{padding:2px 6px;border-radius:4px;color:#02120a}
</style>
</head>
<body>
<h1>⛰️ Procedural Terrain Generator — fractal Perlin / fBm heightmaps</h1>
<div class="layout">
  <div class="panel">
    <div>
      <button id="modeMap" class="active">Top-down</button>
      <button id="mode3d">Isometric 3D</button>
    </div>
    <label>Seed <span id="seedv">1337</span></label><input type="range" id="seed" min="1" max="9999" value="1337">
    <label>Scale <span id="scalev">90</span></label><input type="range" id="scale" min="20" max="220" value="90">
    <label>Octaves <span id="octv">5</span></label><input type="range" id="oct" min="1" max="8" value="5">
    <label>Persistence <span id="persv">0.5</span></label><input type="range" id="pers" min="0.1" max="0.9" step="0.05" value="0.5">
    <label>Lacunarity <span id="lacv">2.0</span></label><input type="range" id="lac" min="1.5" max="3.5" step="0.1" value="2">
    <label>Sea level <span id="seav">0.38</span></label><input type="range" id="sea" min="0" max="0.8" step="0.01" value="0.38">
    <button id="regen">🎲 New Seed</button>
    <div class="legend" id="legend"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px">Permutation-table gradient noise summed across octaves (fractional Brownian motion). Biomes mapped by elevation thresholds.</p>
  </div>
  <div class="panel"><canvas id="cv" width="512" height="512"></canvas></div>
</div>
<script>
"use strict";
// ---- seeded PRNG (mulberry32) ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// ---- classic Perlin with seeded permutation ----
class Perlin{
  constructor(seed){const rnd=mulberry32(seed);this.p=new Uint8Array(512);const perm=[...Array(256).keys()];
    for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[perm[i],perm[j]]=[perm[j],perm[i]];}
    for(let i=0;i<512;i++)this.p[i]=perm[i&255];}
  fade(t){return t*t*t*(t*(t*6-15)+10);}
  lerp(a,b,t){return a+t*(b-a);}
  grad(h,x,y){const u=h&1?-x:x,v=h&2?-y:y;return u+v;}
  noise(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);
    const u=this.fade(x),v=this.fade(y),p=this.p;
    const aa=p[p[X]+Y],ab=p[p[X]+Y+1],ba=p[p[X+1]+Y],bb=p[p[X+1]+Y+1];
    return this.lerp(this.lerp(this.grad(aa,x,y),this.grad(ba,x-1,y),u),this.lerp(this.grad(ab,x,y-1),this.grad(bb,x-1,y-1),u),v);}
}
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const SIZE=192; // computational grid
let height=new Float32Array(SIZE*SIZE);
function P(id){return +document.getElementById(id).value;}
const biomes=[
  {t:0.30,c:[28,82,158],n:'Deep'},{t:0.38,c:[40,120,200],n:'Water'},{t:0.43,c:[222,210,150],n:'Sand'},
  {t:0.55,c:[80,160,70],n:'Grass'},{t:0.68,c:[46,110,46],n:'Forest'},{t:0.80,c:[110,98,80],n:'Rock'},{t:1.01,c:[240,240,250],n:'Snow'}
];
function compute(){
  const seed=P('seed'),scale=P('scale'),oct=P('oct'),pers=P('pers'),lac=P('lac');
  document.getElementById('seedv').textContent=seed;document.getElementById('scalev').textContent=scale;
  document.getElementById('octv').textContent=oct;document.getElementById('persv').textContent=pers;
  document.getElementById('lacv').textContent=lac.toFixed(1);document.getElementById('seav').textContent=P('sea').toFixed(2);
  const perlin=new Perlin(seed);
  let mn=Infinity,mx=-Infinity;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    let amp=1,freq=1,val=0,norm=0;
    for(let o=0;o<oct;o++){val+=perlin.noise(x/scale*freq,y/scale*freq)*amp;norm+=amp;amp*=pers;freq*=lac;}
    val/=norm;
    // radial falloff for island feel
    const dx=(x/SIZE-0.5)*2,dy=(y/SIZE-0.5)*2;const d=Math.sqrt(dx*dx+dy*dy);
    val=val-Math.max(0,(d-0.4))*0.9;
    height[y*SIZE+x]=val;if(val<mn)mn=val;if(val>mx)mx=val;
  }
  for(let i=0;i<height.length;i++)height[i]=(height[i]-mn)/(mx-mn);
}
function colorFor(h){const sea=P('sea');if(h<sea)return h<sea*0.6?biomes[0].c:biomes[1].c;for(const b of biomes)if(h<b.t)return b.c;return biomes[6].c;}
function shade(c,f){return[c[0]*f|0,c[1]*f|0,c[2]*f|0];}
let mode='map';
function drawMap(){
  cv.width=cv.height=SIZE;const img=ctx.createImageData(SIZE,SIZE);
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const h=height[y*SIZE+x];let c=colorFor(h);
    // hillshade from gradient
    if(x>0&&y>0){const gx=h-height[y*SIZE+x-1],gy=h-height[(y-1)*SIZE+x];const slope=1-(gx+gy)*3;c=shade(c,Math.max(0.55,Math.min(1.25,slope)));}
    const i=(y*SIZE+x)*4;img.data[i]=c[0];img.data[i+1]=c[1];img.data[i+2]=c[2];img.data[i+3]=255;
  }
  ctx.putImageData(img,0,0);
}
function draw3d(){
  cv.width=900;cv.height=620;ctx.clearRect(0,0,cv.width,cv.height);
  const step=2,tile=4.2,exag=120,ox=cv.width/2,oy=140;
  for(let y=0;y<SIZE;y+=step)for(let x=0;x<SIZE;x+=step){
    const h=height[y*SIZE+x];
    const sx=ox+(x-y)*tile*0.5;
    const sy=oy+(x+y)*tile*0.25-h*exag;
    let c=colorFor(h);
    const slope=x>0?1-(h-height[y*SIZE+x-step])*4:1;
    c=shade(c,Math.max(0.5,Math.min(1.3,slope)));
    ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.fillRect(sx,sy,tile*1.6,tile*1.6+2);
  }
}
function render(){if(mode==='map')drawMap();else draw3d();legend();}
function legend(){const L=document.getElementById('legend');L.innerHTML=biomes.map(b=>`<span style="background:rgb(${b.c[0]},${b.c[1]},${b.c[2]})">${b.n}</span>`).join('');}
function all(){compute();render();}
['seed','scale','oct','pers','lac','sea'].forEach(id=>document.getElementById(id).oninput=all);
document.getElementById('regen').onclick=()=>{document.getElementById('seed').value=(Math.random()*9999|0)+1;all();};
document.getElementById('modeMap').onclick=function(){mode='map';this.classList.add('active');document.getElementById('mode3d').classList.remove('active');render();};
document.getElementById('mode3d').onclick=function(){mode='3d';this.classList.add('active');document.getElementById('modeMap').classList.remove('active');render();};
all();
</script>
</body>
</html>
